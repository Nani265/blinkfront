# Coturn — install on a VPS with a public IP (same host as API or dedicated).
# Ubuntu: sudo apt install coturn
# Enable: sudo sed -i 's/#TURNSERVER_ENABLED=1/TURNSERVER_ENABLED=1/' /etc/default/coturn
# Copy this file: sudo cp turnserver.conf /etc/turnserver.conf

listening-port=3478
tls-listening-port=5349

# Replace with your server's public IPv4 (required behind NAT)
# external-ip=PUBLIC_IP/PRIVATE_IP
external-ip=YOUR_PUBLIC_IPV4

listening-ip=0.0.0.0
relay-ip=YOUR_PUBLIC_IPV4

fingerprint
lt-cred-mech
realm=turn.copilotai.click

# Must match WEBRTC_TURN_USERNAME / WEBRTC_TURN_PASSWORD on the API
user=copilot_turn_user:CHANGE_ME_STRONG_PASSWORD

# Relay port range — open these in cloud firewall + ufw
min-port=49152
max-port=65535

no-multicast-peers
no-cli
log-file=/var/log/turnserver/turnserver.log
simple-log

# Optional: TLS TURN (recommended for strict networks)
# cert=/etc/letsencrypt/live/turn.copilotai.click/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.copilotai.click/privkey.pem
