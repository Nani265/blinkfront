# Nginx — API + WebSocket + WebRTC signaling (WSS)
# Install: sudo cp api.copilotai.click.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/api.copilotai.click.conf /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d api.copilotai.click
#
# Go backend must listen on 127.0.0.1:8081 (see systemd/copilot-api.service)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream copilot_api {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.copilotai.click;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.copilotai.click;

    # certbot fills these after: certbot --nginx -d api.copilotai.click
    ssl_certificate     /etc/letsencrypt/live/api.copilotai.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.copilotai.click/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # All API routes (REST + vehicle telemetry WS + WebRTC signaling WS + publisher static)
    location /api/ {
        proxy_pass http://copilot_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (required for /api/ws and /api/webrtc/ws)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    86400s;
        proxy_read_timeout    86400s;
        proxy_buffering off;
    }

    # Health check without /api prefix (optional)
    location /health {
        proxy_pass http://copilot_api/api/live-data/stats;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
