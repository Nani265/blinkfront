services:
  - type: web
    name: blinkfront-api
    runtime: go
    plan: free
    rootDir: backend
    buildCommand: go build -o copilot-api ./cmd/server
    startCommand: ./copilot-api
    healthCheckPath: /api/health
    envVars:
      - key: DATA_PATH
        value: /tmp/blinkfront-database.sqlite
      - key: WEBRTC_STUN_URL
        value: stun:stun.l.google.com:19302
      - key: WEBRTC_TURN_URLS
        value: turn:staticauth.openrelay.metered.ca:80,turn:staticauth.openrelay.metered.ca:443,turns:staticauth.openrelay.metered.ca:443?transport=tcp
      - key: WEBRTC_TURN_STATIC_AUTH_SECRET
        value: openrelayprojectsecret
      - key: WEBRTC_TURN_TTL_SECONDS
        value: "3600"
      - key: WEBRTC_MAX_VIEWERS
        value: "10"
